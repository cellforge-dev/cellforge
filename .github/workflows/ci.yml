name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build registry
        env:
          REGISTRY_HOMEPAGE: https://cellforge.dev
        run: pnpm registry:build

      - name: Consumer smoke test
        run: pnpm smoke:consumer

      - name: Build app
        run: pnpm build

      - name: Verify generated registry is committed
        run: git diff --exit-code registry.json public/r
